services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-interstellar}
      POSTGRES_USER: ${POSTGRES_USER:-interstellar_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./infra/postgres/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  careerforge-api:
    build:
      context: .
      dockerfile: apps/careerforge-api/Containerfile
    environment:
      PORT: ${CAREERFORGE_PORT:-8080}
      RUST_LOG: ${CAREERFORGE_RUST_LOG:-careerforge_api=info,tower_http=info}
      DATABASE_URL: ${CAREERFORGE_DATABASE_URL:-postgres://interstellar_app:${POSTGRES_PASSWORD}@postgres:5432/interstellar}
    ports:
      - "${CAREERFORGE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  task-manager-api:
    build:
      context: .
      dockerfile: apps/task-manager-api/Dockerfile
    environment:
      RUST_LOG: ${TASK_MANAGER_RUST_LOG:-info}
      DATABASE_URL: ${TASK_MANAGER_DATABASE_URL:-postgres://interstellar_app:${POSTGRES_PASSWORD}@postgres:5432/interstellar}
    ports:
      - "${TASK_MANAGER_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
